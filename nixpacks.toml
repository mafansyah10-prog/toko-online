[phases.setup]
nixPkgs = ["...", "php83", "php83Packages.composer", "nginx"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
cmds = [
    "npm i",
    "npm run build",
    "mkdir -p storage/framework/{sessions,views,cache}",
    "mkdir -p storage/logs",
    "chmod -R 775 storage bootstrap/cache",
    "php artisan optimize:clear",
    "php artisan filament:optimize-clear"
]

[start]
cmd = "php artisan migrate --force && php artisan optimize && php artisan filament:optimize && php artisan serve --host=0.0.0.0 --port=$PORT"
